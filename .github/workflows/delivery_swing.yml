name: Delivery Swing Finder

on:
  schedule:
    - cron: '45 10 * * 1-5'
  workflow_dispatch:
    inputs:
      index:
        description: 'NSE Index'
        required: false
        default: 'Nifty 50'
      top:
        description: 'Top N stocks'
        required: false
        default: '15'

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python packages
      run: |
        pip install playwright yfinance pandas tabulate colorama schedule requests

    - name: Install Playwright Chromium
      run: |
        playwright install chromium
        playwright install-deps chromium

    - name: Run Delivery Swing Finder
      env:
        PYTHONUNBUFFERED: "1"
      run: |
        mkdir -p results
        INDEX="${{ github.event.inputs.index || 'Nifty 50' }}"
        TOP="${{ github.event.inputs.top || '15' }}"
        python delivery_swing_finder.py \
          --index "$INDEX" \
          --top "$TOP" \
          --csv "results/swings_$(date +'%Y%m%d_%H%M').csv"

    - name: Upload results CSV
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: swing-results-${{ github.run_number }}
        path: results/*.csv
        retention-days: 30

    - name: Send Telegram notification
      if: always()
      env:
        BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python - <<'PYEOF'
        import os, glob, csv, requests

        bot_token = os.environ.get("BOT_TOKEN", "")
        chat_id   = os.environ.get("CHAT_ID", "")
        if not bot_token or not chat_id:
            print("Telegram secrets not set — skipping")
            exit(0)

        files = sorted(glob.glob("results/*.csv"))
        if not files:
            msg = "⚠️ Delivery Swing Finder ran but no CSV produced."
        else:
            latest = files[-1]
            rows = []
            with open(latest, newline="", encoding="utf-8") as f:
                reader = csv.DictReader(f)
                for row in reader:
                    rows.append(row)

            buys = [r for r in rows if "BUY" in r.get("signal", "")]
            date_str = os.path.basename(latest).replace("swings_","").replace(".csv","")

            msg  = f"📊 *Delivery Swing Finder* — {date_str}\n"
            msg += f"Total scanned: {len(rows)}\n\n"

            if buys:
                msg += f"🎯 *{len(buys)} BUY Signals:*\n"
                for b in buys[:8]:
                    name   = b.get("name", "")[:20]
                    ltp    = b.get("ltp", "")
                    score  = b.get("final_score", b.get("del_score",""))
                    signal = b.get("signal", "")
                    msg += f"  `{name:<20}` LTP={ltp}  Score={score}  {signal}\n"
                if len(buys) > 8:
                    msg += f"  _...and {len(buys)-8} more_\n"
            else:
                msg += "No strong BUY signals today.\n"

            msg += "\n📁 Download CSV from GitHub Actions artifacts."

        url  = f"https://api.telegram.org/bot{bot_token}/sendMessage"
        data = {"chat_id": chat_id, "text": msg, "parse_mode": "Markdown"}
        r = requests.post(url, data=data, timeout=10)
        print("Telegram:", r.status_code, r.text[:100])
        PYEOF
